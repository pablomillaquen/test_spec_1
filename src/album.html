<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Album - Photo Album Organizer</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header class="app-header">
    <button class="back-link" id="back-btn">&larr; Back to Albums</button>
    <h1 id="album-title"></h1>
    <button class="btn btn-primary" id="add-photos-btn">+ Add Photos</button>
  </header>
  <main class="main-content" id="album-content">
    <div class="loading" id="album-loading">
      <div class="spinner"></div>
      <p>Loading album...</p>
    </div>
  </main>
  <script type="module" src="/main.js"></script>
</body>
</html>
